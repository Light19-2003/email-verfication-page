<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Reset Password</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #f4f6f8;
        font-family: Arial, Helvetica, sans-serif;
      }

      .card {
        width: 90%;
        max-width: 420px;
        background: white;
        padding: 32px;
        border-radius: 12px;
        box-shadow: 0 10px 35px rgba(0, 0, 0, 0.08);
      }

      h1 {
        margin-top: 0;
        color: #222;
      }

      p {
        color: #666;
        line-height: 1.5;
      }

      label {
        display: block;
        margin-top: 16px;
        margin-bottom: 8px;
        font-weight: bold;
        color: #333;
      }

      input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 16px;
        outline: none;
      }

      input:focus {
        border-color: #2563eb;
      }

      button {
        width: 100%;
        margin-top: 22px;
        padding: 13px;
        border: none;
        border-radius: 6px;
        background: #2563eb;
        color: white;
        font-size: 16px;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      #message {
        margin-top: 20px;
        text-align: center;
        font-weight: bold;
      }

      .success {
        color: green;
      }

      .error {
        color: red;
      }
    </style>
  </head>

  <body>
    <main class="card">
      <h1>Reset Password</h1>

      <p>Enter your new password below.</p>

      <form id="reset-form">
        <label for="password">New password</label>

        <input
          id="password"
          type="password"
          placeholder="Enter new password"
          minlength="8"
          required
        />

        <label for="confirm-password">Confirm password</label>

        <input
          id="confirm-password"
          type="password"
          placeholder="Confirm new password"
          minlength="8"
          required
        />

        <button id="submit-button" type="submit">Reset Password</button>
      </form>

      <p id="message"></p>
    </main>

    <script src="reset-password.js"></script>
  </body>
</html>
